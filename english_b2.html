<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English B2 Kahoot-Style Quiz</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#1e1b4b,#7e22ce);color:white;min-height:100vh}
.container{max-width:1050px;margin:0 auto;padding:18px}
.header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
h1{font-size:2.25rem;margin:14px 0}
.badge{background:white;color:#4c1d95;border-radius:999px;padding:10px 16px;font-weight:bold}
.card{background:white;color:#222;border-radius:28px;padding:24px;box-shadow:0 12px 30px rgba(0,0,0,.35);margin-top:14px}
.meta{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px;color:#555;font-weight:bold}
.progress{height:14px;background:#ddd;border-radius:999px;overflow:hidden}
.bar{height:100%;background:#22c55e;width:0%}
.q{font-size:1.5rem;font-weight:bold;line-height:1.35;margin:18px 0}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{border:none;border-radius:18px;padding:20px 14px;color:white;font-size:1.02rem;font-weight:bold;cursor:pointer;min-height:74px;transition:.15s;touch-action:manipulation}
.btn:hover{transform:scale(1.02)}
.red{background:#e21b3c}.blue{background:#1368ce}.yellow{background:#d89e00;color:#111}.green{background:#26890c}.purple{background:#7b2cbf}
.correct{outline:6px solid #00c853!important;filter:brightness(1.08)}
.wrong{outline:6px solid #ff1744!important;filter:grayscale(.2)}
input{width:100%;font-size:1.15rem;padding:16px;border-radius:14px;border:2px solid #ddd;margin:8px 0 14px}
.next{margin-top:18px;background:#111;color:white;border:none;border-radius:16px;padding:15px 28px;font-size:1.05rem;font-weight:bold;cursor:pointer}
.feedback{font-size:1.05rem;margin-top:16px;padding:14px;border-radius:14px;background:#f1f5f9}
.wordbank,.dropzone{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0;padding:12px;border-radius:16px;background:#f1f5f9;min-height:62px}
.chip{background:#4c1d95;color:white;border:none;border-radius:999px;padding:12px 18px;font-size:1rem;font-weight:bold;cursor:pointer}
.dropzone{border:3px dashed #aaa;background:#fff}
.small{font-size:.95rem;color:#666}
.matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.matchitem{padding:14px;border-radius:14px;background:#f1f5f9;border:2px solid transparent;cursor:pointer}
.selected{border-color:#4c1d95;background:#ede9fe}
.done{opacity:.45;text-decoration:line-through}
.end{font-size:2rem;text-align:center}
@media(max-width:700px){.answers,.matchgrid{grid-template-columns:1fr}.q{font-size:1.25rem}h1{font-size:1.7rem}.card{padding:18px}.btn{min-height:64px}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚡ English B2 Challenge</h1>
    <div class="badge">Kahoot-Stil · 40 Fragen</div>
  </div>
  <div class="card">
    <div class="meta">
      <div id="count"></div>
      <div id="score"></div>
    </div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div id="question" class="q"></div>
    <div id="area"></div>
    <button id="next" class="next" onclick="nextQuestion()" style="display:none">Weiter ➜</button>
  </div>
</div>
<script>
const quiz = [{"type": "mc", "q": "Choose the most natural sentence.", "options": ["Had I known about the delay, I would have taken another train.", "If I would have known about the delay, I had taken another train.", "Had I knew about the delay, I would have taken another train.", "If I had known about the delay, I will have taken another train."], "answer": 0, "explain": "Inversion in the third conditional: Had I known..."}, {"type": "mc", "q": "Choose the correct sentence.", "options": ["Not only did she apologise, but she also offered to pay.", "Not only she apologised, but she also offered to pay.", "Not only did she apologised, but she also offered to pay.", "Not only had she apologise, but she offered also to pay."], "answer": 0, "explain": "After 'Not only' at the beginning, use inversion: did she apologise."}, {"type": "write", "q": "Complete: The issue needs ______ carefully before we make a decision. (consider)", "answers": ["to be considered"], "explain": "Passive infinitive: to be + past participle."}, {"type": "spot", "q": "Spot the reduced relative clause:<br><b>The man sitting by the window is my former teacher.</b>", "answers": ["sitting by the window"], "explain": "Reduced relative clause: the man who is sitting..."}, {"type": "tf", "q": "True or false? “I regret to inform you that your application has been unsuccessful” is correct.", "answer": true, "explain": "Regret to inform = formal phrase for bad news."}, {"type": "dialog", "q": "Complete:<br><b>A:</b> Why didn’t you tell me earlier?<br><b>B:</b> I wish I ______ told you sooner.", "answers": ["had"], "explain": "Wish + past perfect for regrets about the past."}, {"type": "order", "q": "Put the words in the correct order.", "words": ["little", "did", "we", "know", "how", "serious", "the", "problem", "was"], "answer": ["little", "did", "we", "know", "how", "serious", "the", "problem", "was"], "explain": "Inversion after 'Little': Little did we know..."}, {"type": "transform", "q": "Rewrite using inversion:<br><b>If I had known the truth, I would have acted differently.</b>", "answers": ["had i known the truth i would have acted differently"], "explain": "Third conditional inversion: Had I known..."}, {"type": "match", "q": "Match the expressions with their meanings.", "left": ["brush up on", "come up with", "cut down on", "get away with"], "right": ["improve something you once knew", "think of an idea", "reduce", "avoid punishment"], "pairs": [0, 1, 2, 3], "explain": "Common B2 phrasal verbs."}, {"type": "detective", "q": "Which option is most formal?", "options": ["Please find attached the documents you requested.", "Here are the docs you wanted.", "I send you the stuff.", "Got you the papers."], "answer": 0, "explain": "Formal email style: Please find attached..."}, {"type": "mc", "q": "Choose the best sentence.", "options": ["Despite having little experience, she managed the project successfully.", "Despite she had little experience, she managed the project successfully.", "Although having little experience, she managed the project successfully.", "In spite she had little experience, she managed the project successfully."], "answer": 0, "explain": "Despite + noun/-ing phrase."}, {"type": "write", "q": "Complete: He is said ______ one of the best researchers in his field. (be)", "answers": ["to be"], "explain": "Passive reporting structure: He is said to be..."}, {"type": "spot", "q": "Spot the cleft sentence:<br><b>What surprised me most was his honesty.</b>", "answers": ["what surprised me most was his honesty"], "explain": "Cleft structure used for emphasis."}, {"type": "mc", "q": "Choose the correct phrase.", "options": ["It was such a difficult task that nobody finished it.", "It was so difficult task that nobody finished it.", "It was such difficult that nobody finished it.", "It was so a difficult task that nobody finished it."], "answer": 0, "explain": "Such + adjective + noun + that."}, {"type": "tf", "q": "True or false? “No sooner had we arrived than it started raining” is correct.", "answer": true, "explain": "No sooner ... than ... with inversion."}, {"type": "dialog", "q": "Complete:<br><b>A:</b> Do you think he stole the money?<br><b>B:</b> I wouldn’t go so ______ as to accuse him without evidence.", "answers": ["far"], "explain": "Fixed phrase: go so far as to..."}, {"type": "mc", "q": "Choose the correct sentence.", "options": ["The proposal is unlikely to be approved.", "The proposal is unlikely being approved.", "The proposal unlikely to be approved.", "The proposal is unlikely that approved."], "answer": 0, "explain": "Be unlikely to + infinitive."}, {"type": "transform", "q": "Rewrite using a participle clause:<br><b>Because he was exhausted, he went straight to bed.</b>", "answers": ["being exhausted he went straight to bed", "exhausted he went straight to bed"], "explain": "Participle clauses can shorten reason clauses."}, {"type": "lie", "q": "Two truths and one lie: Which sentence is WRONG?", "options": ["She denied having seen the document.", "Had we left earlier, we wouldn’t have missed the train.", "He suggested me to apply for the job."], "answer": 2, "explain": "Correct: He suggested that I apply / He suggested applying."}, {"type": "mc", "q": "Choose the correct mixed conditional.", "options": ["If I had studied medicine, I would be a doctor now.", "If I studied medicine, I would have been a doctor now.", "If I had studied medicine, I will be a doctor now.", "If I would have studied medicine, I would be a doctor now."], "answer": 0, "explain": "Past condition, present result: If + past perfect, would + infinitive."}, {"type": "mc", "q": "Choose the best connector.", "options": ["Nevertheless", "Because", "So that", "Despite"], "answer": 0, "explain": "Nevertheless introduces contrast between sentences."}, {"type": "write", "q": "Complete: The company is believed ______ thousands of jobs last year. (create)", "answers": ["to have created"], "explain": "Past passive reporting: is believed to have created."}, {"type": "tf", "q": "True or false? “I’m looking forward to hearing from you” is correct.", "answer": true, "explain": "Look forward to + -ing."}, {"type": "spot", "q": "Spot the hedging phrase:<br><b>It seems likely that prices will continue to rise.</b>", "answers": ["it seems likely"], "explain": "Hedging makes a statement less absolute."}, {"type": "order", "q": "Put the words in the correct order.", "words": ["were", "I", "to", "accept", "the", "offer", "I", "would", "move", "abroad"], "answer": ["were", "I", "to", "accept", "the", "offer", "I", "would", "move", "abroad"], "explain": "Formal conditional inversion: Were I to accept..."}, {"type": "mc", "q": "Choose the correct sentence.", "options": ["I’d rather you didn’t tell anyone.", "I’d rather you don’t tell anyone.", "I’d rather you not to tell anyone.", "I’d rather you won’t tell anyone."], "answer": 0, "explain": "Would rather + subject + past simple for present/future preference."}, {"type": "dialog", "q": "Complete:<br><b>A:</b> Was the decision popular?<br><b>B:</b> Not really. It gave ______ to a lot of criticism.", "answers": ["rise"], "explain": "Give rise to = cause."}, {"type": "transform", "q": "Rewrite formally:<br><b>People think that the painting is worth millions.</b>", "answers": ["the painting is thought to be worth millions"], "explain": "Formal passive reporting structure."}, {"type": "match", "q": "Match the discourse markers.", "left": ["whereas", "therefore", "moreover", "nevertheless"], "right": ["contrast", "result", "addition", "contrast despite this"], "pairs": [0, 1, 2, 3], "explain": "Useful B2 linking words."}, {"type": "mc", "q": "Choose the best sentence.", "options": ["There is little chance of the plan succeeding.", "There is little chance that the plan to succeed.", "There is few chance of the plan succeeding.", "There is little chance for the plan succeed."], "answer": 0, "explain": "Chance of + -ing."}, {"type": "mc", "q": "Choose the correct sentence.", "options": ["The more you practise, the more confident you become.", "More you practise, more confident you become.", "The more you practise, more confident you become.", "The most you practise, the more confident you become."], "answer": 0, "explain": "Double comparative: The more..., the more..."}, {"type": "write", "q": "Complete: I can’t help ______ that something is wrong. (think)", "answers": ["thinking"], "explain": "Can't help + -ing."}, {"type": "tf", "q": "True or false? “Scarcely had he sat down when the phone rang” is correct.", "answer": true, "explain": "Scarcely ... when ... with inversion."}, {"type": "spot", "q": "Spot the collocation:<br><b>The government has taken measures to reduce unemployment.</b>", "answers": ["taken measures"], "explain": "Common collocation: take measures."}, {"type": "lie", "q": "Two truths and one lie: Which sentence is WRONG?", "options": ["She is capable of dealing with pressure.", "The report is due to be published tomorrow.", "I am not used to drive on the left."], "answer": 2, "explain": "Correct: I am not used to driving on the left."}, {"type": "mc", "q": "Choose the most precise word: “The results were ______, so the experiment had to be repeated.”", "options": ["inconclusive", "unfair", "careless", "ordinary"], "answer": 0, "explain": "Inconclusive = not leading to a clear conclusion."}, {"type": "dialog", "q": "Complete:<br><b>A:</b> Why did they reject the plan?<br><b>B:</b> It was considered ______ risky.", "answers": ["too"], "explain": "Too + adjective = excessively."}, {"type": "transform", "q": "Rewrite using 'so as to':<br><b>She spoke quietly because she didn’t want to wake the baby.</b>", "answers": ["she spoke quietly so as not to wake the baby"], "explain": "So as not to + infinitive = purpose."}, {"type": "mc", "q": "Choose the correct sentence.", "options": ["Having finished the report, he sent it to his manager.", "Having finish the report, he sent it to his manager.", "Had finished the report, he sent it to his manager.", "Having finishing the report, he sent it to his manager."], "answer": 0, "explain": "Perfect participle clause: Having + past participle."}, {"type": "detective", "q": "Which sentence is most appropriate in a formal complaint?", "options": ["I would appreciate it if you could look into this matter.", "Fix this now!", "This is totally annoying.", "You messed everything up."], "answer": 0, "explain": "Formal complaint language is polite and precise."}];
let i=0, score=0, locked=false;
let orderSelected=[], matchLeft=null, matchMade=0;
const qEl=document.getElementById('question'), area=document.getElementById('area'), nextBtn=document.getElementById('next'), countEl=document.getElementById('count'), scoreEl=document.getElementById('score'), bar=document.getElementById('bar');
function norm(s){return (s||'').toLowerCase().trim().replace(/[.!?]/g,'').replace(/,/g,'').replace(/\s+/g,' ').replace(/’/g,"'");}
function setTop(){countEl.textContent=i<quiz.length?`Frage ${i+1} / ${quiz.length}`:'Fertig';scoreEl.textContent=`Punkte: ${score}`;bar.style.width=`${(i/quiz.length)*100}%`;}
function render(){locked=false;orderSelected=[];matchLeft=null;matchMade=0;nextBtn.style.display='none';area.innerHTML='';setTop();const q=quiz[i];qEl.innerHTML=q.q;if(['mc','detective','lie'].includes(q.type))renderMC(q);if(q.type==='tf')renderTF(q);if(['write','dialog','spot','transform'].includes(q.type))renderWrite(q);if(q.type==='order')renderOrder(q);if(q.type==='match')renderMatch(q);}
function feedback(ok,text){const div=document.createElement('div');div.className='feedback';div.innerHTML=(ok?'✅ ':'❌ ')+text;area.appendChild(div);nextBtn.style.display='inline-block';}
function renderMC(q){const wrap=document.createElement('div');wrap.className='answers';q.options.forEach((op,idx)=>{const b=document.createElement('button');b.className='btn '+['red','blue','yellow','green'][idx%4];b.textContent=op;b.onclick=()=>{if(locked)return;locked=true;[...wrap.children].forEach(x=>x.disabled=true);if(idx===q.answer){score++;b.classList.add('correct');feedback(true,q.explain);}else{b.classList.add('wrong');wrap.children[q.answer].classList.add('correct');feedback(false,q.explain);}setTop();};wrap.appendChild(b);});area.appendChild(wrap);}
function renderTF(q){const wrap=document.createElement('div');wrap.className='answers';[['True',true,'blue'],['False',false,'red']].forEach(([label,val,color])=>{const b=document.createElement('button');b.className='btn '+color;b.textContent=label;b.onclick=()=>{if(locked)return;locked=true;[...wrap.children].forEach(x=>x.disabled=true);if(val===q.answer){score++;b.classList.add('correct');feedback(true,q.explain);}else{b.classList.add('wrong');feedback(false,q.explain);}setTop();};wrap.appendChild(b);});area.appendChild(wrap);}
function renderWrite(q){const inp=document.createElement('input');inp.placeholder='Antwort eingeben ...';const b=document.createElement('button');b.className='btn green';b.textContent='Prüfen';b.onclick=()=>{if(locked)return;locked=true;inp.disabled=true;b.disabled=true;const val=norm(inp.value);const ok=q.answers.some(a=>val===norm(a)||(q.type==='spot'&&val.includes(norm(a))));if(ok){score++;feedback(true,q.explain);}else{feedback(false,`Mögliche Lösung: <b>${q.answers[0]}</b><br>${q.explain}`);}setTop();};area.appendChild(inp);area.appendChild(b);}
function renderOrder(q){const bank=document.createElement('div');bank.className='wordbank';const zone=document.createElement('div');zone.className='dropzone';zone.innerHTML='<span class="small">Klicke die Wörter in der richtigen Reihenfolge an.</span>';const check=document.createElement('button');check.className='btn green';check.textContent='Reihenfolge prüfen';q.words.forEach(w=>{const c=document.createElement('button');c.className='chip';c.textContent=w;c.onclick=()=>{if(locked||c.disabled)return;c.disabled=true;c.style.opacity=.4;orderSelected.push(w);if(zone.querySelector('.small'))zone.innerHTML='';const z=document.createElement('span');z.className='chip';z.textContent=w;zone.appendChild(z);};bank.appendChild(c);});check.onclick=()=>{if(locked)return;locked=true;const ok=norm(orderSelected.join(' '))===norm(q.answer.join(' '));if(ok){score++;feedback(true,q.explain);}else feedback(false,`Richtig: <b>${q.answer.join(' ')}</b><br>${q.explain}`);setTop();};area.appendChild(bank);area.appendChild(zone);area.appendChild(check);}
function renderMatch(q){const info=document.createElement('div');info.className='small';info.textContent='Klicke links einen Ausdruck und dann rechts die passende Bedeutung an.';const grid=document.createElement('div');grid.className='matchgrid';const lcol=document.createElement('div'),rcol=document.createElement('div');q.left.forEach((txt,idx)=>{const d=document.createElement('div');d.className='matchitem';d.textContent=txt;d.onclick=()=>{if(locked||d.classList.contains('done'))return;[...lcol.children].forEach(x=>x.classList.remove('selected'));d.classList.add('selected');matchLeft=idx;};lcol.appendChild(d);});q.right.forEach((txt,idx)=>{const d=document.createElement('div');d.className='matchitem';d.textContent=txt;d.onclick=()=>{if(locked||matchLeft===null||d.classList.contains('done'))return;if(q.pairs[matchLeft]===idx){lcol.children[matchLeft].classList.add('done');d.classList.add('done');matchMade++;matchLeft=null;[...lcol.children].forEach(x=>x.classList.remove('selected'));if(matchMade===q.left.length){locked=true;score++;feedback(true,q.explain);setTop();}}else{locked=true;feedback(false,'Nicht ganz. '+q.explain);setTop();}};rcol.appendChild(d);});grid.appendChild(lcol);grid.appendChild(rcol);area.appendChild(info);area.appendChild(grid);}
function nextQuestion(){i++;if(i<quiz.length)render();else end();}
function end(){bar.style.width='100%';qEl.innerHTML='🏆 Fertig!';area.innerHTML=`<div class="end">Du hast <b>${score}</b> von <b>${quiz.length}</b> Punkten erreicht.<br><br>${score>=34?'🔥 Sehr starkes B2-Niveau!':score>=25?'👏 Gut gemacht!':'💪 Weiter üben!'}</div>`;nextBtn.style.display='none';setTop();}
render();
</script>
</body>
</html>
